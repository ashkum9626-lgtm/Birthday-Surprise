<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Magic</title>
    <style>
        /* Soft Pastel Gradient - Lovely and light */
        body { background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%); color: #D4418E; font-family: 'Courier New', Courier, monospace; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; transition: background 1s ease; }
        .pixel-card { background: rgba(255, 255, 255, 0.8); border: 4px solid #D4418E; padding: 30px; box-shadow: 8px 8px 0px #D4418E; border-radius: 10px; max-width: 85%; }
        .btn { padding: 15px 25px; font-size: 18px; background: #D4418E; color: white; border: none; cursor: pointer; font-weight: bold; box-shadow: 4px 4px 0px #8B0000; margin-top: 20px; transition: transform 0.2s; }
        .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #8B0000; }
        .pixel-art { font-size: 60px; margin-bottom: 15px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div class="pixel-card">
        <div id="art" class="pixel-art">✨</div>
        <h2 id="text">Click for Surprise</h2>
        <button id="mainBtn" class="btn" onclick="nextStep()">Tap Here</button>
    </div>
    <audio id="bdaySong" src="song.mp3" preload="auto"></audio>

    <script>
        let step = 1;
        function nextStep() {
            let audio = document.getElementById("bdaySong");
            let art = document.getElementById("art");
            let text = document.getElementById("text");
            let btn = document.getElementById("mainBtn");

            if(step === 1) {
                audio.play(); 
                art.innerText = "💃🏽";
                text.innerText = "Itni jldi bhi kya he nanhi Pari he...";
                btn.innerText = "Sabar Karo!";
                document.body.style.background = "linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%)";
                step = 2;
            } else if(step === 2) {
                art.innerText = "💝";
                text.innerText = "Happy Birthday Sweety!";
                btn.style.display = "none";
                document.body.style.background = "linear-gradient(135deg, #fff1eb 0%, #ace0f9 100%)";
                // Final Kuboom effect using background change
                step = 3;
            }
        }
    </script>
</body>
</html>
