<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Magic - Jarvis 5.0</title>
    <style>
        body { background: #8B0000; color: #FFD700; font-family: 'Arial', sans-serif; text-align: center; margin-top: 50px; }
        .btn { padding: 15px 30px; font-size: 20px; background: #FFD700; color: #8B0000; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <h1>Happy Birthday! 🎂</h1>
    <p>A Special Surprise for You...</p>
    <br>
    <button class="btn" onclick="playMusic()">Click for Magic</button>
    <audio id="bdaySong" src="song.mp3" preload="auto"></audio>

    <script>
        function playMusic() {
            var audio = document.getElementById("bdaySong");
            audio.play().catch(function(error) {
                alert("Please tap again to trigger the magic!");
            });
        }
    </script>
</body>
</html>
