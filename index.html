<!DOCTYPE html>
<html>
<head>
    <title>Birthday Magic - Jarvis 5.0 Edition</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden; background: #000;">
    <a-scene>
        <a-assets>
            <audio id="bdaySong" src="song.mp3" preload="auto"></audio>
        </a-assets>

        <a-sky color="#050505"></a-sky>
        <a-entity light="type: ambient; color: #FFD700; intensity: 0.5"></a-entity>

        <a-entity id="mainMessage" 
                  text="value: Happy Birthday Sweety; color: #B22222; align: center; width: 8; font: https://cdn.aframe.io/fonts/Exo2Bold.fnt" 
                  position="0 2.5 -4" 
                  animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 1500; loop: true">
        </a-entity>

        <a-entity id="hearts" position="0 1 -3">
            <a-entity geometry="primitive: heart" material="color: #B22222" scale="0.1 0.1 0.1"
                      animation="property: position; to: 0 4 0; dur: 5000; loop: true"></a-entity>
        </a-entity>

        <a-entity id="teddy" position="2 0.5 -3" rotation="0 -30 0">
             <a-box color="#8B4513" scale="0.5 0.8 0.5" 
                    animation="property: rotation; to: 0 -45 0; dir: alternate; dur: 1000; loop: true"></a-box>
        </a-entity>

        <a-entity id="mouseCursor" cursor="rayOrigin: mouse"></a-entity>
        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        // [cite: 2026-02-22] Screen pe kahin bhi click karte hi Diljit shuru ho jayega
        document.body.addEventListener('click', function () {
            var audio = document.querySelector('#bdaySong');
            audio.play();
        });
    </script>
</body>
</html>
